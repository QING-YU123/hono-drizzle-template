openapi: 3.0.3
info:
  title: 用户认证与管理 API
  version: v0.1.0-MVP
  description: |
    基于验证码的用户注册和密码登录功能。

    ## 系统特点
    - **用户认证**：支持邮箱注册、密码登录、令牌刷新和注销
    - **JWT 令牌**：访问令牌有效期 15 分钟，刷新令牌有效期 7 天
    - **密码安全**：使用 bcrypt 哈希，成本因子 12
    - **软删除**：用户删除采用软删除模式，数据可恢复
    - **RESTful 设计**：遵循 RESTful API 设计规范

    ## 业务说明
    本 API 提供完整的用户认证和管理功能，包括用户注册、登录、令牌管理以及用户信息的增删改查操作。
    访问令牌用于身份验证，刷新令牌用于获取新的访问令牌。

servers:
  - url: http://localhost:3001
    description: 本地开发环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户管理
    description: 用户信息管理接口

paths:
  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      operationId: register
      description: |
        ### 业务说明

        创建新用户账户，邮箱必须唯一，密码最少 8 个字符。

        #### 功能特点
        - **邮箱验证**：验证邮箱格式是否正确
        - **密码强度**：密码最少 8 个字符
        - **用户名称**：可选参数，如未提供则使用邮箱前缀
        - **密码安全**：密码使用 bcrypt 哈希存储，成本因子 12

        #### 使用场景
        - 新用户首次注册账户
        - 创建测试用户

        #### 验证规则
        - **email**：必填，有效的邮箱格式
        - **password**：必填，最少 8 个字符
        - **name**：可选，字符串类型

        #### 错误处理
        - **400**：JSON 格式无效或参数验证失败
        - **409**：邮箱已被注册

        #### 注意事项
        - 密码会被哈希处理，不会以明文存储
        - 注册成功后需要登录获取访问令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              注册成功:
                value:
                  email: 'zhangsan@example.com'
                  password: 'password123'
                  name: '张三'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                注册成功:
                  value:
                    id: 1
                    name: '张三'
                    email: 'zhangsan@example.com'
                    is_admin: false
                    created_at: '2024-01-15T08:30:00.000Z'
                    updated_at: '2024-01-15T08:30:00.000Z'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                邮箱格式无效:
                  value:
                    message: 'email must be a valid email address'
                密码太短:
                  value:
                    message: 'password must be at least 8 characters'
                JSON格式无效:
                  value:
                    message: 'Invalid JSON body'
        '409':
          description: 邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                邮箱已存在:
                  value:
                    message: 'Email already exists'

  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      operationId: login
      description: |
        ### 业务说明

        验证用户身份并签发访问令牌和刷新令牌。

        #### 功能特点
        - **身份验证**：验证邮箱和密码是否匹配
        - **JWT 访问令牌**：有效期 15 分钟，用于 API 访问
        - **刷新令牌**：有效期 7 天，用于获取新的访问令牌
        - **安全提示**：错误时不区分"邮箱不存在"和"密码错误"

        #### 使用场景
        - 用户登录系统
        - 获取访问令牌进行后续操作

        #### 验证规则
        - **email**：必填，非空字符串
        - **password**：必填，非空字符串

        #### 错误处理
        - **400**：JSON 格式无效或参数验证失败
        - **401**：邮箱或密码错误

        #### 注意事项
        - 访问令牌过期后需要使用刷新令牌获取新的访问令牌
        - 刷新令牌每次刷新后会轮换，旧令牌失效
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              登录成功:
                value:
                  email: 'zhangsan@example.com'
                  password: 'password123'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                登录成功:
                  value:
                    accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
                    refreshToken: 'dGhpcy1pcy1hLXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
                    user:
                      id: 1
                      email: 'zhangsan@example.com'
                      name: '张三'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                缺少邮箱:
                  value:
                    message: 'email is required'
                缺少密码:
                  value:
                    message: 'password is required'
        '401':
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                登录失败:
                  value:
                    message: 'Invalid email or password'

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新访问令牌
      operationId: refresh
      description: |
        ### 业务说明

        使用刷新令牌获取新的访问令牌和刷新令牌（令牌轮换）。

        #### 功能特点
        - **令牌轮换**：每次刷新生成新的刷新令牌，旧令牌失效
        - **无感刷新**：在访问令牌过期前自动刷新
        - **有效期管理**：新的刷新令牌有效期重新计算为 7 天

        #### 使用场景
        - 访问令牌即将过期时获取新令牌
        - 无需用户重新输入密码

        #### 验证规则
        - **refreshToken**：必填，非空字符串

        #### 错误处理
        - **400**：JSON 格式无效或参数验证失败
        - **401**：刷新令牌无效或过期

        #### 注意事项
        - 刷新令牌只能使用一次，刷新后旧令牌失效
        - 刷新令牌过期后需要重新登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              刷新令牌:
                value:
                  refreshToken: 'dGhpcy1pcy1hLXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              examples:
                刷新成功:
                  value:
                    accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
                    refreshToken: 'bmV3LXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                缺少令牌:
                  value:
                    message: 'refreshToken is required'
        '401':
          description: 刷新令牌无效或过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                令牌无效:
                  value:
                    message: 'Invalid or expired refresh token'

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 注销登录
      operationId: logout
      description: |
        ### 业务说明

        删除服务端的刷新令牌会话，使当前登录失效。

        #### 功能特点
        - **会话注销**：删除服务端的刷新令牌记录
        - **幂等操作**：重复注销返回成功

        #### 使用场景
        - 用户主动退出登录
        - 清除设备登录状态

        #### 验证规则
        - **refreshToken**：必填，非空字符串

        #### 错误处理
        - **400**：JSON 格式无效或参数验证失败

        #### 注意事项
        - 注销后访问令牌仍然有效直到过期
        - 如需立即失效，需要在客户端清除访问令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              注销:
                value:
                  refreshToken: 'dGhpcy1pcy1hLXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
      responses:
        '200':
          description: 注销成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                注销成功:
                  value:
                    message: 'Logged out successfully'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                缺少令牌:
                  value:
                    message: 'refreshToken is required'

  /api/users:
    get:
      tags:
        - 用户管理
      summary: 获取所有用户
      operationId: getAllUsers
      description: |
        ### 业务说明

        获取所有未被软删除的用户列表。

        #### 功能特点
        - **软删除过滤**：不包含已被软删除的用户
        - **完整信息**：返回用户的所有字段

        #### 使用场景
        - 管理员查看所有用户
        - 用户列表展示

        #### 注意事项
        - 返回的数据包含软删除字段
        - 数据量大时建议使用分页
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                用户列表:
                  value:
                    - id: 1
                      name: '张三'
                      email: 'zhangsan@example.com'
                      is_admin: false
                      created_at: '2024-01-15T08:30:00.000Z'
                      updated_at: '2024-01-15T08:30:00.000Z'
                    - id: 2
                      name: '李四'
                      email: 'lisi@example.com'
                      is_admin: true
                      created_at: '2024-01-16T09:00:00.000Z'
                      updated_at: '2024-01-16T09:00:00.000Z'

    post:
      tags:
        - 用户管理
      summary: 创建用户
      operationId: createUser
      description: |
        ### 业务说明

        创建新用户，需要提供 name 和 email 字段。

        #### 功能特点
        - **邮箱唯一**：邮箱必须唯一，重复返回 409
        - **自动时间戳**：自动设置创建时间和更新时间

        #### 使用场景
        - 管理员创建用户

        #### 验证规则
        - **name**：必填，非空字符串
        - **email**：必填，非空字符串

        #### 错误处理
        - **400**：JSON 格式无效或参数验证失败
        - **409**：邮箱已存在

        #### 注意事项
        - 此接口不设置密码，密码需要通过认证模块注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              创建用户:
                value:
                  name: '王五'
                  email: 'wangwu@example.com'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                创建成功:
                  value:
                    id: 3
                    name: '王五'
                    email: 'wangwu@example.com'
                    is_admin: false
                    created_at: '2024-01-17T10:00:00.000Z'
                    updated_at: '2024-01-17T10:00:00.000Z'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                缺少名称:
                  value:
                    message: 'name is required'
                缺少邮箱:
                  value:
                    message: 'email is required'
        '409':
          description: 邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                邮箱已存在:
                  value:
                    message: 'Email already exists'

  /api/users/{id}:
    get:
      tags:
        - 用户管理
      summary: 获取单个用户
      operationId: getUserById
      description: |
        ### 业务说明

        获取指定 ID 的用户信息，如果用户不存在或已被软删除则返回 404。

        #### 功能特点
        - **软删除检测**：已软删除的用户返回 404

        #### 使用场景
        - 查看用户详情
        - 验证用户存在性

        #### 验证规则
        - **id**：必填，正整数

        #### 错误处理
        - **400**：ID 格式无效
        - **404**：用户不存在
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 用户 ID
          example: 1
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                用户详情:
                  value:
                    id: 1
                    name: '张三'
                    email: 'zhangsan@example.com'
                    is_admin: false
                    created_at: '2024-01-15T08:30:00.000Z'
                    updated_at: '2024-01-15T08:30:00.000Z'
        '400':
          description: ID 格式无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                无效ID:
                  value:
                    message: 'Invalid id'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                用户不存在:
                  value:
                    message: 'User not found'

    put:
      tags:
        - 用户管理
      summary: 更新用户
      operationId: updateUser
      description: |
        ### 业务说明

        部分更新指定 ID 的用户信息，只更新提供的字段。

        #### 功能特点
        - **部分更新**：只更新提供的字段
        - **邮箱唯一**：更新邮箱时检查唯一性

        #### 使用场景
        - 用户修改个人信息
        - 管理员修改用户信息

        #### 验证规则
        - **id**：必填，正整数
        - **name**：可选，非空字符串
        - **email**：可选，非空字符串

        #### 错误处理
        - **400**：ID 格式无效、参数验证失败或没有字段需要更新
        - **404**：用户不存在
        - **409**：邮箱已存在

        #### 注意事项
        - 至少需要提供一个要更新的字段
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 用户 ID
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            examples:
              更新名称:
                value:
                  name: '张三丰'
              更新邮箱:
                value:
                  email: 'zhangsanfeng@example.com'
              同时更新:
                value:
                  name: '张三丰'
                  email: 'zhangsanfeng@example.com'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                更新成功:
                  value:
                    id: 1
                    name: '张三丰'
                    email: 'zhangsanfeng@example.com'
                    is_admin: false
                    created_at: '2024-01-15T08:30:00.000Z'
                    updated_at: '2024-01-17T11:00:00.000Z'
        '400':
          description: 请求参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                无效ID:
                  value:
                    message: 'Invalid id'
                没有字段更新:
                  value:
                    message: 'Nothing to update'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                用户不存在:
                  value:
                    message: 'User not found'
        '409':
          description: 邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                邮箱已存在:
                  value:
                    message: 'Email already exists'

    delete:
      tags:
        - 用户管理
      summary: 删除用户
      operationId: deleteUser
      description: |
        ### 业务说明

        将指定 ID 的用户标记为已删除，而不是从数据库中物理删除。

        #### 功能特点
        - **软删除**：设置 deleted_at 时间戳
        - **数据保留**：数据不会从数据库中物理删除
        - **查询过滤**：软删除后的用户不会出现在查询结果中

        #### 使用场景
        - 管理员删除用户
        - 用户注销账户

        #### 验证规则
        - **id**：必填，正整数

        #### 错误处理
        - **400**：ID 格式无效
        - **404**：用户不存在

        #### 注意事项
        - 软删除后的用户可以通过数据库直接恢复
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 用户 ID
          example: 1
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
              examples:
                删除成功:
                  value:
                    message: 'Deleted'
                    data:
                      id: 1
                      name: '张三'
                      email: 'zhangsan@example.com'
                      is_admin: false
                      created_at: '2024-01-15T08:30:00.000Z'
                      updated_at: '2024-01-15T08:30:00.000Z'
                      deleted_at: '2024-01-17T12:00:00.000Z'
        '400':
          description: ID 格式无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                无效ID:
                  value:
                    message: 'Invalid id'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                用户不存在:
                  value:
                    message: 'User not found'

  /user/me:
    get:
      tags:
        - 用户管理
      summary: 获取当前登录用户信息
      operationId: getCurrentUser
      description: |
        ### 业务说明

        使用 JWT 访问令牌获取当前登录用户的完整信息。

        #### 功能特点
        - **令牌验证**：验证访问令牌的有效性
        - **用户信息**：返回完整的用户信息（不含密码）

        #### 使用场景
        - 获取当前登录用户信息
        - 验证登录状态

        #### 认证要求
        - **Authorization**：必填，格式为 `Bearer {accessToken}`

        #### 错误处理
        - **401**：未认证或令牌无效

        #### 注意事项
        - 令牌过期后需要使用刷新令牌获取新的访问令牌
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                当前用户:
                  value:
                    id: 1
                    name: '张三'
                    email: 'zhangsan@example.com'
                    is_admin: false
                    created_at: '2024-01-15T08:30:00.000Z'
                    updated_at: '2024-01-15T08:30:00.000Z'
        '401':
          description: 未认证或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                未认证:
                  value:
                    message: 'Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 访问令牌，格式为 `Bearer {accessToken}`

  schemas:
    User:
      type: object
      description: 用户信息
      properties:
        id:
          type: integer
          format: int64
          description: 用户 ID
          example: 1
        name:
          type: string
          description: 用户名称
          example: '张三'
        email:
          type: string
          format: email
          description: 用户邮箱
          example: 'zhangsan@example.com'
        is_admin:
          type: boolean
          description: 是否为管理员
          example: false
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: '2024-01-15T08:30:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: 更新时间
          example: '2024-01-15T08:30:00.000Z'
      required:
        - id
        - name
        - email
        - is_admin
        - created_at
        - updated_at
      additionalProperties: false

    RegisterRequest:
      type: object
      description: 用户注册请求
      properties:
        email:
          type: string
          format: email
          description: 用户邮箱
          example: 'zhangsan@example.com'
        password:
          type: string
          minLength: 8
          description: 密码（最少 8 个字符）
          example: 'password123'
        name:
          type: string
          description: 用户名称（可选）
          example: '张三'
      required:
        - email
        - password
      additionalProperties: false

    LoginRequest:
      type: object
      description: 用户登录请求
      properties:
        email:
          type: string
          format: email
          description: 用户邮箱
          example: 'zhangsan@example.com'
        password:
          type: string
          description: 密码
          example: 'password123'
      required:
        - email
        - password
      additionalProperties: false

    LoginResponse:
      type: object
      description: 登录响应
      properties:
        accessToken:
          type: string
          description: JWT 访问令牌（有效期 15 分钟）
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        refreshToken:
          type: string
          description: 刷新令牌（有效期 7 天）
          example: 'dGhpcy1pcy1hLXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
        user:
          type: object
          description: 用户信息
          properties:
            id:
              type: integer
              format: int64
              description: 用户 ID
              example: 1
            email:
              type: string
              format: email
              description: 用户邮箱
              example: 'zhangsan@example.com'
            name:
              type: string
              description: 用户名称
              example: '张三'
      required:
        - accessToken
        - refreshToken
        - user
      additionalProperties: false

    RefreshRequest:
      type: object
      description: 刷新令牌请求
      properties:
        refreshToken:
          type: string
          description: 刷新令牌
          example: 'dGhpcy1pcy1hLXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
      required:
        - refreshToken
      additionalProperties: false

    RefreshResponse:
      type: object
      description: 刷新令牌响应
      properties:
        accessToken:
          type: string
          description: 新的 JWT 访问令牌（有效期 15 分钟）
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        refreshToken:
          type: string
          description: 新的刷新令牌（有效期 7 天）
          example: 'bmV3LXJlbGF0aXZlbHktbG9uZy1yZWZyZXNoLXRva2Vu'
      required:
        - accessToken
        - refreshToken
      additionalProperties: false

    LogoutResponse:
      type: object
      description: 注销响应
      properties:
        message:
          type: string
          description: 响应消息
          example: 'Logged out successfully'
      required:
        - message
      additionalProperties: false

    CreateUserRequest:
      type: object
      description: 创建用户请求
      properties:
        name:
          type: string
          description: 用户名称
          example: '王五'
        email:
          type: string
          format: email
          description: 用户邮箱
          example: 'wangwu@example.com'
      required:
        - name
        - email
      additionalProperties: false

    UpdateUserRequest:
      type: object
      description: 更新用户请求
      properties:
        name:
          type: string
          description: 新的用户名称
          example: '张三丰'
        email:
          type: string
          format: email
          description: 新的用户邮箱
          example: 'zhangsanfeng@example.com'
      additionalProperties: false

    DeleteUserResponse:
      type: object
      description: 删除用户响应
      properties:
        message:
          type: string
          description: 响应消息
          example: 'Deleted'
        data:
          $ref: '#/components/schemas/User'
      required:
        - message
        - data
      additionalProperties: false

    ErrorResponse:
      type: object
      description: 错误响应
      properties:
        message:
          type: string
          description: 错误消息
          example: 'Error message'
      required:
        - message
      additionalProperties: false
